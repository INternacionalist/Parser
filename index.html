<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT вакансии - Уфа</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #10141c;
      --panel: #171c26;
      --panel-2: #1f2633;
      --border: #313a4c;
      --text: #eef3ff;
      --muted: #9ba8c2;
      --accent: #52c7a5;
      --accent-2: #7dd3fc;
      --salary: #8ce99a;
      --danger: #ff8787;
      --radius: 10px;
    }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(180deg, #0d1118 0%, #10141c 100%);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(16, 20, 28, 0.92);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .logo {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0d1118;
      font-size: 1.1rem;
      font-weight: 700;
    }

    h1 {
      font-size: 1.35rem;
      line-height: 1.2;
    }

    .header-sub {
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 3px;
    }

    .meta-tag {
      margin-left: auto;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: calc(100vh - 85px);
    }

    aside {
      border-right: 1px solid var(--border);
      background: var(--panel);
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: sticky;
      top: 85px;
      height: calc(100vh - 85px);
      overflow-y: auto;
    }

    .panel-title {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .filter-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.76rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 11px 13px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      outline: none;
      font-size: 0.92rem;
    }

    input[type="text"]:focus,
    select:focus {
      border-color: var(--accent);
    }

    .salary-labels {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 10px;
    }

    .salary-labels span span {
      color: var(--text);
      font-weight: 600;
    }

    .range-track {
      position: relative;
      height: 6px;
      background: var(--border);
      border-radius: 999px;
      margin: 18px 0 8px;
    }

    .range-fill {
      position: absolute;
      top: 0;
      bottom: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    input[type="range"] {
      position: absolute;
      left: 0;
      width: 100%;
      height: 24px;
      top: 50%;
      transform: translateY(-50%);
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      pointer-events: none;
      z-index: 2;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--bg);
      box-shadow: 0 0 0 2px rgba(82, 199, 165, 0.35);
      pointer-events: all;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--bg);
      box-shadow: 0 0 0 2px rgba(82, 199, 165, 0.35);
      pointer-events: all;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-track {
      background: transparent;
      border: none;
    }

    .btn-reset {
      margin-top: auto;
      padding: 11px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
    }

    .btn-reset:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    main {
      padding: 22px 24px 28px;
      overflow-x: auto;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .count-badge {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      font-size: 0.84rem;
    }

    .count-badge b {
      color: var(--text);
    }

    #sort {
      width: auto;
      min-width: 160px;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 0.84rem;
    }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(23, 28, 38, 0.72);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1040px;
    }

    thead tr {
      background: var(--panel-2);
    }

    th {
      text-align: left;
      padding: 14px 16px;
      color: var(--muted);
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    tbody tr {
      border-top: 1px solid var(--border);
    }

    tbody tr:hover {
      background: rgba(125, 211, 252, 0.05);
    }

    td {
      padding: 14px 16px;
      vertical-align: top;
      font-size: 0.9rem;
    }

    .title-cell a {
      color: var(--text);
      font-weight: 600;
      text-decoration: none;
      line-height: 1.45;
    }

    .title-cell a:hover {
      color: var(--accent-2);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--muted);
      font-size: 0.76rem;
      white-space: nowrap;
    }

    .salary {
      color: var(--salary);
      font-weight: 600;
      display: inline-block;
      max-width: 170px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: top;
    }

    .date-main {
      color: var(--text);
      font-size: 0.84rem;
      font-weight: 600;
      display: block;
    }

    .date-sub {
      color: var(--muted);
      font-size: 0.76rem;
      margin-top: 4px;
      display: block;
    }

    .muted {
      color: var(--muted);
    }

    #loader,
    .no-data {
      min-height: 58vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-box {
      max-width: 560px;
      padding: 20px 24px;
      border-radius: 12px;
      border: 1px solid rgba(255, 135, 135, 0.35);
      background: rgba(255, 135, 135, 0.1);
      color: var(--danger);
      line-height: 1.5;
    }

    code {
      color: var(--text);
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      aside {
        border-right: none;
        border-bottom: 1px solid var(--border);
        position: static;
        height: auto;
        overflow: visible;
      }

      .meta-tag {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">IT</div>
    <div>
      <h1>IT вакансии</h1>
      <div class="header-sub">Уфа, удаленка, несколько источников</div>
    </div>
    <div class="meta-tag" id="meta-tag">Загрузка...</div>
  </header>

  <div class="layout">
    <aside>
      <div class="panel-title">Фильтры</div>

      <div class="filter-group">
        <label for="search">Поиск</label>
        <input type="text" id="search" placeholder="Python, QA, DevOps..." />
      </div>

      <div class="filter-group">
        <label for="source-filter">Источник</label>
        <select id="source-filter">
          <option value="">Все сайты</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="exp-filter">Опыт</label>
        <select id="exp-filter">
          <option value="">Любой</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="grade-filter">Грейд</label>
        <select id="grade-filter">
          <option value="">Любой</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="employment-filter">Формат</label>
        <select id="employment-filter">
          <option value="">Любой</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Зарплата от</label>
        <div class="salary-labels">
          <span>Мин: <span id="sal-min-lbl">0</span></span>
          <span>Макс: <span id="sal-max-lbl">0</span></span>
        </div>
        <div class="range-track">
          <div class="range-fill" id="range-fill"></div>
          <input type="range" id="sal-min" min="0" max="500000" step="5000" value="0" />
          <input type="range" id="sal-max" min="0" max="500000" step="5000" value="500000" />
        </div>
      </div>

      <button class="btn-reset" id="btn-reset">Сбросить фильтры</button>
    </aside>

    <main>
      <div id="loader">
        <div class="spinner"></div>
        <div>Загружаем вакансии...</div>
      </div>

      <div id="content" style="display: none;">
        <div class="toolbar">
          <div class="count-badge">
            Показано: <b id="shown-count">0</b> из <b id="total-count">0</b>
          </div>

          <select id="sort">
            <option value="date_desc">Сначала новые</option>
            <option value="date_asc">Сначала старые</option>
            <option value="sal_desc">Зарплата ↓</option>
            <option value="sal_asc">Зарплата ↑</option>
            <option value="title_asc">По названию</option>
          </select>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Вакансия</th>
                <th>Зарплата</th>
                <th>Опыт</th>
                <th>Грейд</th>
                <th>Формат</th>
                <th>Источник</th>
                <th>Дата</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <div id="no-data" class="no-data" style="display: none;">
          <div>Ничего не найдено. Попробуй ослабить фильтры.</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    let allVacancies = [];
    let salaryBounds = { min: 0, max: 500000 };

    async function loadData() {
      try {
        const response = await fetch("vacancies.json");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        allVacancies = Array.isArray(data.vacancies) ? data.vacancies : [];

        const meta = data.meta || {};
        const sources = Array.isArray(meta.sources) ? meta.sources.join(", ") : "не указаны";
        const parsedAt = meta.parsed_at ? new Date(meta.parsed_at).toLocaleString("ru-RU") : "не указано";
        document.getElementById("meta-tag").textContent =
          `${allVacancies.length} вакансий • ${sources} • ${parsedAt}`;

        initFilters();
        applyFilters();

        document.getElementById("loader").style.display = "none";
        document.getElementById("content").style.display = "block";
      } catch (error) {
        document.getElementById("loader").innerHTML = `
          <div class="error-box">
            <b>Не удалось загрузить <code>vacancies.json</code></b><br><br>
            Сначала запусти парсер: <code>python main.py</code><br>
            Если открыл HTML напрямую и браузер блокирует <code>fetch</code>, подними локальный сервер:
            <code>python -m http.server 8000</code><br><br>
            <small>${escapeHtml(error.message)}</small>
          </div>
        `;
      }
    }

    function initFilters() {
      fillSelect("source-filter", uniqueValues(allVacancies.map(item => item.source)), "Все сайты");
      fillSelect("exp-filter", uniqueValues(allVacancies.map(item => item.experience)), "Любой");
      fillSelect("grade-filter", uniqueValues(allVacancies.map(item => item.grade)), "Любой");
      fillSelect("employment-filter", uniqueValues(allVacancies.map(item => item.employment)), "Любой");

      const salaryValues = allVacancies
        .flatMap(item => [item.salary?.from, item.salary?.to])
        .filter(value => Number.isFinite(value));

      if (salaryValues.length) {
        salaryBounds.min = Math.floor(Math.min(...salaryValues) / 5000) * 5000;
        salaryBounds.max = Math.ceil(Math.max(...salaryValues) / 5000) * 5000;
      }

      ["sal-min", "sal-max"].forEach(id => {
        const input = document.getElementById(id);
        input.min = salaryBounds.min;
        input.max = salaryBounds.max;
        input.step = 5000;
      });

      document.getElementById("sal-min").value = salaryBounds.min;
      document.getElementById("sal-max").value = salaryBounds.max;
      updateRangeUI();
    }

    function fillSelect(id, values, defaultLabel) {
      const select = document.getElementById(id);
      select.innerHTML = "";

      const baseOption = document.createElement("option");
      baseOption.value = "";
      baseOption.textContent = defaultLabel;
      select.appendChild(baseOption);

      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function uniqueValues(values) {
      return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b, "ru"));
    }

    function updateRangeUI() {
      const minInput = document.getElementById("sal-min");
      const maxInput = document.getElementById("sal-max");
      const fill = document.getElementById("range-fill");

      let minValue = Number(minInput.value);
      let maxValue = Number(maxInput.value);
      if (minValue > maxValue) {
        [minValue, maxValue] = [maxValue, minValue];
      }

      const span = Math.max(salaryBounds.max - salaryBounds.min, 1);
      const toPercent = value => ((value - salaryBounds.min) / span) * 100;

      fill.style.left = `${toPercent(minValue)}%`;
      fill.style.width = `${toPercent(maxValue) - toPercent(minValue)}%`;

      document.getElementById("sal-min-lbl").textContent = minValue.toLocaleString("ru-RU");
      document.getElementById("sal-max-lbl").textContent = maxValue.toLocaleString("ru-RU");
    }

    function applyFilters() {
      const query = document.getElementById("search").value.toLowerCase().trim();
      const source = document.getElementById("source-filter").value;
      const experience = document.getElementById("exp-filter").value;
      const grade = document.getElementById("grade-filter").value;
      const employment = document.getElementById("employment-filter").value;
      const salaryMin = Number(document.getElementById("sal-min").value);
      const salaryMax = Number(document.getElementById("sal-max").value);
      const sort = document.getElementById("sort").value;

      let items = allVacancies.filter(item => {
        const haystack = [
          item.title,
          item.experience,
          item.grade,
          item.employment,
          item.source,
          item.salary?.text
        ].join(" ").toLowerCase();

        if (query && !haystack.includes(query)) return false;
        if (source && item.source !== source) return false;
        if (experience && item.experience !== experience) return false;
        if (grade && item.grade !== grade) return false;
        if (employment && item.employment !== employment) return false;

        const salaryPoint = item.salary?.from ?? item.salary?.to ?? null;
        if (salaryPoint !== null && (salaryPoint < salaryMin || salaryPoint > salaryMax)) return false;

        return true;
      });

      items.sort((a, b) => {
        if (sort === "date_desc") return new Date(b.published_at) - new Date(a.published_at);
        if (sort === "date_asc") return new Date(a.published_at) - new Date(b.published_at);
        if (sort === "title_asc") return (a.title || "").localeCompare(b.title || "", "ru");

        const salaryA = a.salary?.from ?? a.salary?.to ?? 0;
        const salaryB = b.salary?.from ?? b.salary?.to ?? 0;
        return sort === "sal_desc" ? salaryB - salaryA : salaryA - salaryB;
      });

      renderTable(items);
      document.getElementById("shown-count").textContent = items.length;
      document.getElementById("total-count").textContent = allVacancies.length;
    }

    function renderTable(vacancies) {
      const tbody = document.getElementById("tbody");
      const noData = document.getElementById("no-data");
      const tableWrap = document.querySelector(".table-wrap");

      if (!vacancies.length) {
        tbody.innerHTML = "";
        tableWrap.style.display = "none";
        noData.style.display = "flex";
        return;
      }

      tableWrap.style.display = "block";
      noData.style.display = "none";

      tbody.innerHTML = vacancies.map(item => {
        const salaryLabel = trimText(item.salary?.text || "Договорная", 28);
        const salaryText = item.salary?.text && item.salary.text !== "Договорная"
          ? `<span class="salary" title="${escapeHtml(item.salary.text)}">${escapeHtml(salaryLabel)}</span>`
          : `<span class="muted">Договорная</span>`;

        const dateMain = relativeDate(item.published_at);
        const dateSub = absoluteDate(item.published_at);

        return `
          <tr>
            <td class="title-cell">
              <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">${escapeHtml(item.title || "Без названия")}</a>
            </td>
            <td>${salaryText}</td>
            <td>${badgeOrMuted(item.experience, "Не указан")}</td>
            <td>${badgeOrMuted(item.grade, "Не указан")}</td>
            <td>${badgeOrMuted(item.employment, "Не указан")}</td>
            <td>${badgeOrMuted(item.source, "Не указан")}</td>
            <td>
              <span class="date-main">${escapeHtml(dateMain)}</span>
              <span class="date-sub">${escapeHtml(dateSub)}</span>
            </td>
          </tr>
        `;
      }).join("");
    }

    function badgeOrMuted(text, emptyLabel) {
      if (!text || text === emptyLabel) {
        return `<span class="muted">${escapeHtml(text || emptyLabel)}</span>`;
      }
      return `<span class="pill">${escapeHtml(text)}</span>`;
    }

    function relativeDate(value) {
      if (!value) return "Не указана";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "Не указана";

      const now = new Date();
      const diffMs = now - date;
      const diffMinutes = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);
      const diffWeeks = Math.floor(diffDays / 7);
      const diffMonths = Math.floor(diffDays / 30);
      const diffYears = Math.floor(diffDays / 365);

      if (diffMinutes < 1) return "Только что";
      if (diffMinutes < 60) return pluralize(diffMinutes, "минуту назад", "минуты назад", "минут назад");
      if (diffHours < 24) return pluralize(diffHours, "час назад", "часа назад", "часов назад");
      if (diffDays < 7) return pluralize(diffDays, "день назад", "дня назад", "дней назад");
      if (diffWeeks < 5) return pluralize(diffWeeks, "неделю назад", "недели назад", "недель назад");
      if (diffMonths < 12) return pluralize(diffMonths, "месяц назад", "месяца назад", "месяцев назад");
      return pluralize(diffYears, "год назад", "года назад", "лет назад");
    }

    function absoluteDate(value) {
      if (!value) return "Дата не указана";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "Дата не указана";
      return date.toLocaleString("ru-RU", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function pluralize(num, one, few, many) {
      const mod10 = num % 10;
      const mod100 = num % 100;
      if (mod10 === 1 && mod100 !== 11) return `${num} ${one}`;
      if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return `${num} ${few}`;
      return `${num} ${many}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function trimText(value, limit) {
      const text = String(value ?? "").trim();
      if (text.length <= limit) return text;
      return `${text.slice(0, Math.max(0, limit - 3)).trim()}...`;
    }

    ["search", "source-filter", "exp-filter", "grade-filter", "employment-filter", "sort"].forEach(id => {
      document.getElementById(id).addEventListener("input", applyFilters);
      document.getElementById(id).addEventListener("change", applyFilters);
    });

    document.getElementById("sal-min").addEventListener("input", () => {
      const minInput = document.getElementById("sal-min");
      const maxInput = document.getElementById("sal-max");
      if (Number(minInput.value) > Number(maxInput.value)) {
        minInput.value = maxInput.value;
      }
      updateRangeUI();
      applyFilters();
    });

    document.getElementById("sal-max").addEventListener("input", () => {
      const minInput = document.getElementById("sal-min");
      const maxInput = document.getElementById("sal-max");
      if (Number(maxInput.value) < Number(minInput.value)) {
        maxInput.value = minInput.value;
      }
      updateRangeUI();
      applyFilters();
    });

    document.getElementById("btn-reset").addEventListener("click", () => {
      document.getElementById("search").value = "";
      document.getElementById("source-filter").value = "";
      document.getElementById("exp-filter").value = "";
      document.getElementById("grade-filter").value = "";
      document.getElementById("employment-filter").value = "";
      document.getElementById("sort").value = "date_desc";
      document.getElementById("sal-min").value = salaryBounds.min;
      document.getElementById("sal-max").value = salaryBounds.max;
      updateRangeUI();
      applyFilters();
    });

    loadData();
  </script>
</body>
</html>
